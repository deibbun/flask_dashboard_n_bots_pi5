<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Executive Engine</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; margin: 0; padding: 10px; height: auto; min-height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;}
        h2, h3 { margin: 5px 0; color: #4CAF50; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        .controls button { background: #333; color: #fff; border: 1px solid #555; padding: 5px 15px; cursor: pointer; border-radius: 3px; font-family: monospace; }
        .controls button:hover { background: #444; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 10px; flex: 1; overflow: hidden; }
        .panel { background: #1e1e1e; border: 1px solid #333; border-radius: 5px; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .span-2 { grid-column: span 2; }
        .table-container { overflow-y: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #333; }
        th { position: sticky; top: 0; background: #2c2c2c; color: #bbb; }
        .status-message { font-size: 0.9em; margin-top: 5px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        
        /* Mode Toggle */
        #mode-toggle { font-weight: bold; transition: all 0.3s ease; }
        
        /* Panic Button Styling */
        .panic-btn { background: #5a1a1a !important; color: #ffcccb !important; border: 1px solid #f44336 !important; padding: 2px 8px !important; font-size: 0.9em; }
        .panic-btn:hover { background: #f44336 !important; color: #fff !important; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🚀 Executive Engine</h2>
        <div class="controls">
            <span id="balance-display" style="font-size: 1.2em; font-weight: bold; margin-right: 20px;">Balance: $0.00</span>
            
            <button id="mode-toggle" onclick="toggleMode()">Loading Mode...</button>
            <button onclick="testConnection()">Test Connection</button>
            <button onclick="fetchData()">Manual Refresh</button>
            
            <div id="conn-status" class="status-message"></div>
        </div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>🌐 Market Oracle (V2)</h3>
            <div class="table-container">
                <table id="market-table">
                    <thead><tr><th>Symbol</th><th>Live Price</th><th>Closed Price</th><th>SMA</th><th>ATR %</th><th>Momentum</th><th>RSI</th><th>Hunting</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <h3>📊 Live Positions</h3>
            <div class="table-container">
                <table id="positions-table">
                    <thead><tr><th>Strategy</th><th>Symbol</th><th>Status</th><th>Qty</th><th>Entry</th><th>TP</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="panel span-2" style="max-height: 250px;">
            <h3>📜 Live Journals</h3>
            <div class="table-container">
                <table id="journals-table">
                    <thead><tr><th>Time</th><th>Strategy</th><th>Level</th><th>Message</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function formatUSD(num) { return '$' + parseFloat(num).toFixed(2); }
        
        async function toggleMode() {
            const btn = document.getElementById('mode-toggle');
            btn.innerText = 'Switching...';
            try {
                const res = await fetch('/api/toggle_mode', { method: 'POST' });
                await res.json();
                fetchData(); 
            } catch (e) {
                console.error("Mode toggle failed", e);
                btn.innerText = 'Error';
            }
        }

        async function testConnection() {
            const statusDiv = document.getElementById('conn-status');
            statusDiv.innerHTML = '<span style="color: #aaa;">Testing...</span>';
            try {
                const res = await fetch('/api/test_connection');
                const json = await res.json();
                if (json.status === 'success') {
                    statusDiv.innerHTML = `<span class="success">✓ ${json.message}</span>`;
                } else {
                    statusDiv.innerHTML = `<span class="error">✗ ${json.message}</span>`;
                }
            } catch (e) {
                statusDiv.innerHTML = `<span class="error">✗ Network Error</span>`;
            }
            setTimeout(() => statusDiv.innerHTML = '', 5000);
        }

        async function manualOverride(strategyId, symbol) {
            if(confirm(`🚨 EXECUTIVE OVERRIDE:\n\nAre you sure you want to instantly liquidate ${strategyId} on ${symbol} at current market price?`)) {
                try {
                    const res = await fetch('/api/override/close', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ strategy_id: strategyId, symbol: symbol })
                    });
                    const data = await res.json();
                    console.log("Liquidation Complete:", data);
                    fetchData(); 
                } catch (e) {
                    console.error("Override failed", e);
                    alert("Failed to reach the Executive Engine.");
                }
            }
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/data');
                const json = await res.json();
                
                if (json.status !== 'success') {
                    console.error("Data error:", json.message);
                    return;
                }
                
                const data = json.data;

                document.getElementById('balance-display').innerText = 'Balance: ' + formatUSD(data.balance);

                const modeBtn = document.getElementById('mode-toggle');
                if (data.live_mode) {
                    modeBtn.innerText = "🔴 LIVE MODE ACTIVE";
                    modeBtn.style.border = "1px solid #f44336";
                    modeBtn.style.color = "#f44336";
                } else {
                    modeBtn.innerText = "📝 PAPER TRADING";
                    modeBtn.style.border = "1px solid #4CAF50";
                    modeBtn.style.color = "#4CAF50";
                }

                // 3. Update the Data Tables
                document.querySelector('#market-table tbody').innerHTML = data.market.map(row => {
                    const p = parseFloat(row.price);
                    const s = parseFloat(row.sma);
                    const priceColor = p > s ? '#4CAF50' : '#f44336';
                    
                    const isMom = String(row.momentum_ignition).toLowerCase() === 'true';
                    const isHunt = String(row.is_hunting).toLowerCase() === 'true';

                    // --- NEW: ATR and RSI Color Math ---
                    const atr = parseFloat(row.atr_pct);
                    const rsi = parseFloat(row.rsi);
                    
                    // Volatility threshold: > 0.7% is Green, else Red
                    const atrColor = atr >= 0.7 ? '#4CAF50' : '#f44336';
                    
                    // RSI threshold: > 50 is Green (Bullish), else Red (Bearish)
                    // If you prefer < 30 to be green (Oversold), change the ">=" to "<="
                    const rsiColor = rsi >= 50 ? '#4CAF50' : '#f44336';

                    return `<tr>
                        <td>${row.symbol}</td>
                        <td style="color: ${priceColor}; font-weight: bold;">${row.price}</td>
                        <td>${row.closed_price}</td>
                        <td>${row.sma}</td>
                        <td style="color: ${atrColor}; font-weight: bold;">${row.atr_pct}%</td>
                        <td style="color: ${isMom ? '#4CAF50' : '#bbb'}">${row.momentum_ignition}</td>
                        <td style="color: ${rsiColor}; font-weight: bold;">${row.rsi}</td>
                        <td style="color: ${isHunt ? '#4CAF50' : '#bbb'}">${row.is_hunting}</td>
                    </tr>`;
                }).join('');

                document.querySelector('#positions-table tbody').innerHTML = data.positions.map(row => 
                    `<tr><td>${row.strategy_id}</td><td>${row.symbol}</td>
                    <td style="color: ${row.status === 'OPEN' ? '#4CAF50' : '#bbb'}">${row.status}</td>
                    <td>${row.qty}</td><td>${row.entry_price}</td><td>${row.tp_price}</td>
                    <td>${row.status === 'OPEN' ? `<button class="panic-btn" onclick="manualOverride('${row.strategy_id}', '${row.symbol}')">CLOSE</button>` : '-'}</td></tr>`
                ).join('');

                document.querySelector('#journals-table tbody').innerHTML = data.journals.map(row => 
                    `<tr><td>${row.updated_time}</td><td>${row.strategy_id}</td>
                    <td style="color: ${row.log_level === 'WARNING' ? '#ff9800' : '#bbb'}">${row.log_level}</td>
                    <td>${row.message}</td></tr>`
                ).join('');

            } catch (e) {
                console.error("Failed to fetch data", e);
            }
        }

        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
